<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDYBOARD - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --gold-dark: #b8956a;
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --border: #222222;
            --text: #ffffff;
            --text-muted: #888888;
            --input-bg: #1a1a1a;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .background {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(212, 165, 116, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 165, 116, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.15), transparent 70%);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.1), transparent 70%);
            bottom: -50px;
            left: -50px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 165, 116, 0.08), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-30px) scale(1.05); opacity: 0.8; }
        }

        /* Particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 6s ease-in-out infinite;
        }

        @keyframes particle-float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            color: var(--gold);
            border-color: rgba(212, 165, 116, 0.3);
            background: rgba(212, 165, 116, 0.05);
            transform: translateX(-4px);
        }

        .back-btn svg {
            transition: transform 0.3s ease;
        }

        .back-btn:hover svg {
            transform: translateX(-4px);
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            animation: card-enter 0.8s ease-out;
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.2), transparent 50%, rgba(212, 165, 116, 0.1));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: xor;
            -webkit-mask-composite: xor;
            pointer-events: none;
        }

        .card-glow {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(212, 165, 116, 0.03), transparent 40%);
            pointer-events: none;
        }

        /* Logo */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            animation: logo-enter 1s ease-out 0.2s both;
        }

        @keyframes logo-enter {
            from {
                opacity: 0;
                transform: scale(0.8) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        .logo-icon {
            position: relative;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(212, 165, 116, 0.3);
            animation: logo-pulse 3s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(212, 165, 116, 0.3); }
            50% { box-shadow: 0 12px 48px rgba(212, 165, 116, 0.5); }
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            color: var(--bg-dark);
        }

        .sparkle {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: sparkle-orbit 4s linear infinite;
        }

        @keyframes sparkle-orbit {
            from { transform: rotate(0deg) translateX(8px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(8px) rotate(-360deg); }
        }

        .sparkle svg {
            width: 14px;
            height: 14px;
            color: var(--gold);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--input-bg);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
            position: relative;
        }

        .tab-indicator {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .tab-indicator.right {
            transform: translateX(100%);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
            border-radius: 10px;
        }

        .tab.active {
            color: var(--bg-dark);
        }

        .tab:not(.active):hover {
            color: var(--text);
        }

        /* Form */
        .form-container {
            position: relative;
            min-height: 320px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: form-enter 0.4s ease-out;
        }

        @keyframes form-enter {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form.hidden {
            display: none;
        }

        /* Input Group */
        .input-group {
            position: relative;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
        }

        .input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input::placeholder {
            color: #555;
        }

        .input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.15), 0 0 20px rgba(212, 165, 116, 0.1);
        }

        .input:focus + .input-icon,
        .input-group:focus-within .input-label {
            color: var(--gold);
        }

        .input-group:focus-within .input-icon {
            color: var(--gold);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--gold);
            background: rgba(212, 165, 116, 0.1);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* Remember Me */
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .checkbox.checked {
            background: var(--gold);
            border-color: var(--gold);
        }

        .checkbox svg {
            width: 14px;
            height: 14px;
            color: var(--bg-dark);
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }

        .checkbox.checked svg {
            opacity: 1;
            transform: scale(1);
        }

        .checkbox-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        .forgot-link {
            font-size: 14px;
            color: var(--gold);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--gold-light);
            text-decoration: underline;
        }

        /* Submit Button */
        .submit-btn {
            position: relative;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: var(--bg-dark);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .btn-content {
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        /* Error Message */
        .error-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #ef4444;
            font-size: 14px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .error-message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .success-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .success-circle {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-ring {
            position: absolute;
            inset: 0;
            border: 3px solid var(--gold);
            border-radius: 50%;
            animation: ring-pulse 2s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        .success-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .success-ring:nth-child(3) {
            animation-delay: 1s;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: success-pop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.3s both;
        }

        @keyframes success-pop {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: var(--bg-dark);
            animation: check-draw 0.5s ease 0.6s both;
        }

        @keyframes check-draw {
            from {
                stroke-dashoffset: 50;
                opacity: 0;
            }
            to {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .success-text {
            margin-top: 32px;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            animation: fade-up 0.5s ease 0.8s both;
        }

        .success-subtext {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 16px;
            animation: fade-up 0.5s ease 1s both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            animation: card-enter 0.8s ease-out 0.3s both;
        }

        .footer a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--gold-light);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 28px 24px;
            }

            .logo-text {
                font-size: 24px;
            }

            .back-btn {
                top: 16px;
                left: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="background">
        <div class="grid-pattern"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <a href="#" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
            </svg>
            Retour
        </a>

        <!-- Card -->
        <div class="card">
            <div class="card-glow"></div>

            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                    </svg>
                    <div class="sparkle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        </svg>
                    </div>
                </div>
                <span class="logo-text">STUDYBOARD</span>
                <span class="logo-subtitle">Plateforme Educative</span>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-indicator" id="tabIndicator"></div>
                <button class="tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
                <button class="tab" id="tabRegister" onclick="switchTab('register')">Inscription</button>
            </div>

            <!-- Forms -->
            <div class="form-container">
                <!-- Error Message -->
                <div class="error-message" id="errorMessage">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
                    </svg>
                    <span id="errorText">Identifiants incorrects</span>
                </div>

                <!-- Login Form -->
                <form class="form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label class="input-label">Email ou Matricule</label>
                        <div class="input-wrapper">
                            <input type="text" class="input" placeholder="votre@email.com" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" class="input" id="loginPassword" placeholder="Votre mot de passe" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="remember-row">
                        <label class="checkbox-wrapper" onclick="toggleCheckbox(this)">
                            <div class="checkbox">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <span class="checkbox-label">Se souvenir de moi</span>
                        </label>
                        <a href="#" class="forgot-link">Mot de passe oublie ?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span class="btn-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>
                            </svg>
                            Se connecter
                        </span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <!-- Register Form -->
                <form class="form hidden" id="registerForm" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label class="input-label">Nom complet</label>
                        <div class="input-wrapper">
                            <input type="text" class="input" placeholder="Jean Dupont" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Email</label>
                        <div class="input-wrapper">
                            <input type="email" class="input" placeholder="votre@email.com" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" class="input" id="registerPassword" placeholder="Minimum 8 caracteres" required>
                            <span class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">
                        <span class="btn-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                            </svg>
                            Creer mon compte
                        </span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            En continuant, vous acceptez nos <a href="#">Conditions d&apos;utilisation</a>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-circle">
            <div class="success-ring"></div>
            <div class="success-ring"></div>
            <div class="success-ring"></div>
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
        </div>
        <div class="success-text">Connexion reussie !</div>
        <div class="success-subtext">Redirection en cours...</div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Tab switching
        function switchTab(tab) {
            const loginTab = document.getElementById('tabLogin');
            const registerTab = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const indicator = document.getElementById('tabIndicator');
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.classList.remove('show');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                indicator.classList.remove('right');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                indicator.classList.add('right');
            }

            // Re-trigger animation
            const activeForm = tab === 'login' ? loginForm : registerForm;
            activeForm.style.animation = 'none';
            activeForm.offsetHeight;
            activeForm.style.animation = 'form-enter 0.4s ease-out';
        }

        // Toggle password visibility
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeOpen = btn.querySelector('.eye-open');
            const eyeClosed = btn.querySelector('.eye-closed');

            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }

        // Toggle checkbox
        function toggleCheckbox(wrapper) {
            const checkbox = wrapper.querySelector('.checkbox');
            checkbox.classList.toggle('checked');
        }

        // Handle login
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');

            btn.classList.add('loading');
            errorMessage.classList.remove('show');

            setTimeout(() => {
                btn.classList.remove('loading');
                // Simulate success
                document.getElementById('successOverlay').classList.add('show');
                
                // Redirect after delay
                setTimeout(() => {
                    // window.location.href = 'dashboard.html';
                }, 2500);
            }, 1500);
        }

        // Handle register
        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMessage = document.getElementById('errorMessage');

            btn.classList.add('loading');
            errorMessage.classList.remove('show');

            setTimeout(() => {
                btn.classList.remove('loading');
                document.getElementById('successOverlay').classList.add('show');
            }, 1500);
        }

        // Show error example
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
